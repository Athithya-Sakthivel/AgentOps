<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentOps Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <header class="bg-white shadow-sm p-4 flex justify-between items-center">
    <h1 class="text-lg font-bold">AgentOps Support</h1>
    <div class="text-sm">
      <span id="user-display"></span>
      <a href="/" class="ml-4 text-blue-600 hover:underline">Home</a>
      <button onclick="logout()" class="ml-4 text-red-600 hover:underline">Sign Out</button>
    </div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto w-full p-4 flex flex-col">
    <div id="messages" class="flex-1 bg-white rounded-lg shadow p-4 mb-4 overflow-y-auto space-y-3" style="max-height: 60vh;">
      <div class="text-center text-sm text-gray-400">Connected. How can we help you today?</div>
    </div>

    <form id="chat-form" class="flex space-x-2" onsubmit="return false;">
      <input id="query-input" type="text" placeholder="Type your message..." autocomplete="off"
             class="flex-1 border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      <button id="send-btn" type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition disabled:opacity-50">
        Send
      </button>
    </form>
  </main>

  <script src="/app.js"></script>
  <script>
    const token = localStorage.getItem('app_jwt');
    if (!token) { window.location.href = '/auth/login'; }

    const sessionId = 'chat-' + Math.random().toString(36).substring(2, 10);
    const ws = new WebSocket(`wss://${location.host}/ws/chat/${sessionId}?token=${token}`);
    const messagesDiv = document.getElementById('messages');
    const queryInput = document.getElementById('query-input');
    const sendBtn = document.getElementById('send-btn');

    ws.onopen = () => {
      messagesDiv.innerHTML += '<div class="text-center text-sm text-green-500">Connected.</div>';
      sendBtn.disabled = false;
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      const msgDiv = document.createElement('div');
      msgDiv.className = 'bg-blue-50 border border-blue-200 rounded-lg p-3 text-gray-800';
      msgDiv.textContent = data.response || JSON.stringify(data);
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };

    ws.onerror = () => {
      messagesDiv.innerHTML += '<div class="text-center text-sm text-red-500">Connection error.</div>';
    };

    ws.onclose = () => {
      messagesDiv.innerHTML += '<div class="text-center text-sm text-red-500">Disconnected.</div>';
      sendBtn.disabled = true;
    };

    document.getElementById('chat-form').addEventListener('submit', () => {
      const query = queryInput.value.trim();
      if (!query) return;
      ws.send(JSON.stringify({ query }));
      const userMsg = document.createElement('div');
      userMsg.className = 'bg-gray-100 border border-gray-200 rounded-lg p-3 text-right text-gray-700';
      userMsg.textContent = query;
      messagesDiv.appendChild(userMsg);
      queryInput.value = '';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json())
      .then(d => { document.getElementById('user-display').textContent = d.user.name || d.user.email; });
  </script>
</body>
</html>
