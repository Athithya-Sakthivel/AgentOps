<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kestral — Support Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="chat-page">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-icon">🏪</span>
        <span class="brand-text">Kestral</span>
      </a>
      <div class="nav-user">
        <span class="nav-user-name" id="user-display"></span>
        <span class="nav-badge">Online</span>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="#" onclick="logout()" class="nav-link nav-link-danger">Sign Out</a>
      </div>
    </div>
  </nav>

  <div class="chat-layout">
    <aside class="chat-sidebar">
      <div class="sidebar-header">💡 Quick Help</div>
      <div class="quick-actions">
        <button onclick="sendQuick('Where is my order?')" class="quick-btn">📦 Track Order</button>
        <button onclick="sendQuick('I want to return an item')" class="quick-btn">↩️ Return Item</button>
        <button onclick="sendQuick('What is your refund policy?')" class="quick-btn">💰 Refund Policy</button>
        <button onclick="sendQuick('My delivery is late')" class="quick-btn">🚚 Late Delivery</button>
      </div>
    </aside>

    <main class="chat-main">
      <div id="messages" class="chat-messages">
        <div class="chat-bubble bubble-system">
          <div class="bubble-avatar">🤖</div>
          <div class="bubble-content">
            <p>Hi there! I'm Kestral's AI support assistant. I can help you with orders, returns, refunds, and deliveries. How can I help you today?</p>
          </div>
        </div>
      </div>
      <form id="chat-form" class="chat-input-bar" onsubmit="return false;">
        <input id="query-input" type="text" placeholder="Type your message..." autocomplete="off" autofocus>
        <button id="send-btn" type="submit" disabled>Send</button>
      </form>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    const token = localStorage.getItem('app_jwt');
    if (!token) window.location.href = '/auth/login';

    const sessionId = 'chat-' + Math.random().toString(36).substring(2, 10);
    const ws = new WebSocket(`wss://${location.host}/ws/chat/${sessionId}?token=${token}`);
    const messagesDiv = document.getElementById('messages');
    const queryInput = document.getElementById('query-input');
    const sendBtn = document.getElementById('send-btn');

    function addBubble(text, type) {
      const div = document.createElement('div');
      div.className = `chat-bubble bubble-${type}`;
      const avatar = type === 'user' ? '👤' : '🤖';
      div.innerHTML = `<div class="bubble-avatar">${avatar}</div><div class="bubble-content"><p>${text}</p></div>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    ws.onopen = () => { sendBtn.disabled = false; };
    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);
      addBubble(d.response || JSON.stringify(d), 'agent');
    };
    ws.onerror = () => addBubble('Connection error. Please refresh.', 'system');
    ws.onclose = () => { sendBtn.disabled = true; addBubble('Session ended. Refresh to reconnect.', 'system'); };

    document.getElementById('chat-form').addEventListener('submit', () => {
      const query = queryInput.value.trim();
      if (!query) return;
      ws.send(JSON.stringify({ query, user_id: 'a1b2c3d4-e5f6-4a7b-8c9d-ffff00000001' }));
      addBubble(query, 'user');
      queryInput.value = '';
    });

    function sendQuick(text) { queryInput.value = text; document.getElementById('chat-form').dispatchEvent(new Event('submit')); }

    fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(d => {
        document.getElementById('user-display').textContent = d.user.name || d.user.email;
      });
  </script>
</body>
</html>
