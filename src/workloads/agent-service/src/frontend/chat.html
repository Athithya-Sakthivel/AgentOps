<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kestral – Support Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    .navbar { background: #fff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
    .nav-container { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 24px; }
    .nav-brand { font-size: 1.4rem; font-weight: 700; color: #0d6efd; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-links { margin-left: auto; display: flex; gap: 16px; align-items: center; }
    .nav-link { text-decoration: none; color: #475569; font-size: 14px; font-weight: 500; }
    .nav-link:hover { color: #0f172a; }
    .btn-ghost { background: transparent; border: none; color: #64748b; font-size: 14px; cursor: pointer; }
    .btn-ghost:hover { color: #dc3545; }
    .chat-layout { max-width: 1100px; margin: 0 auto; display: flex; height: calc(100vh - 64px); }
    .chat-sidebar { width: 220px; background: #fff; border-right: 1px solid #e2e8f0; padding: 24px 16px; }
    .chat-sidebar h3 { font-size: 14px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .chat-sidebar button { display: block; width: 100%; text-align: left; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; margin-bottom: 8px; font-size: 13px; cursor: pointer; color: #334155; transition: all 0.2s; }
    .chat-sidebar button:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; }
    .chat-input-bar { display: flex; gap: 12px; padding: 16px 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
    .chat-input-bar input { flex: 1; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .chat-input-bar input:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.1); }
    .chat-input-bar button { padding: 12px 24px; background: #0d6efd; color: #fff; border: none; border-radius: 10px; font-weight: 500; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    .chat-input-bar button:hover { background: #0b5ed7; }
    .chat-input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .bubble { display: flex; gap: 10px; margin-bottom: 16px; max-width: 75%; }
    .bubble.user { margin-left: auto; flex-direction: row-reverse; }
    .bubble-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .bubble-text { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .bubble.agent .bubble-text { background: #f1f5f9; color: #334155; }
    .bubble.user .bubble-text { background: #0d6efd; color: #fff; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">🏪 Kestral</a>
      <div class="nav-links">
        <a href="/" class="nav-link">← Store</a>
        <button onclick="logout()" class="btn-ghost">Sign Out</button>
      </div>
    </div>
  </nav>
  <div class="chat-layout">
    <aside class="chat-sidebar">
      <h3>Quick Help</h3>
      <button onclick="sendQuick('Where is my order?')">📦 Track Order</button>
      <button onclick="sendQuick('I want to return an item')">↩️ Return</button>
      <button onclick="sendQuick('What is your refund policy?')">💰 Refund</button>
      <button onclick="sendQuick('My delivery is late')">🚚 Late Delivery</button>
    </aside>
    <main class="chat-main">
      <div id="messages" class="chat-messages">
        <div class="bubble agent">
          <div class="bubble-avatar">🤖</div>
          <div class="bubble-text">Hi! How can I help you today?</div>
        </div>
      </div>
      <div class="chat-input-bar">
        <input id="query-input" type="text" placeholder="Type your message..." autofocus>
        <button id="send-btn" disabled>Send</button>
      </div>
    </main>
  </div>
  <script src="/app.js?v=3"></script>
  <script>
    const token = localStorage.getItem('app_jwt');
    if (!token) location.href = '/';
    const sessionId = 'full-' + Math.random().toString(36).substr(2, 9);
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${wsProto}//${location.host}/ws/chat/${sessionId}?token=${token}`);
    const msgs = document.getElementById('messages');
    const input = document.getElementById('query-input');
    const sendBtn = document.getElementById('send-btn');
    function addBubble(text, type) {
      const d = document.createElement('div');
      d.className = `bubble ${type}`;
      d.innerHTML = `<div class="bubble-avatar">${type==='user'?'👤':'🤖'}</div><div class="bubble-text">${text}</div>`;
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
    }
    ws.onopen = () => sendBtn.disabled = false;
    ws.onmessage = e => addBubble(JSON.parse(e.data).response || 'Error', 'agent');
    ws.onerror = () => addBubble('Connection error', 'agent');
    sendBtn.addEventListener('click', () => {
      const q = input.value.trim();
      if (!q) return;
      ws.send(JSON.stringify({ query: q }));
      addBubble(q, 'user');
      input.value = '';
    });
    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });
    function sendQuick(msg) { input.value = msg; sendBtn.click(); }
  </script>
</body>
</html>
