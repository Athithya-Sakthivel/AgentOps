<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kestral — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <nav class="navbar admin-nav">
    <div class="nav-container">
      <a href="/" class="nav-brand">
        <span class="brand-icon">🏪</span>
        <span>Kestral Admin</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">Store</a>
        <button onclick="logout()" class="btn btn-ghost">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="#overview" class="sidebar-link active">📊 Overview</a>
      <a href="#queue" class="sidebar-link">🎫 Ticket Queue</a>
      <a href="#overrides" class="sidebar-link">✏️ Overrides</a>
    </aside>
    <main class="admin-content">
      <section id="overview">
        <h2>Overview</h2>
        <div class="stats-grid">
          <div class="stat-card blue"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total Tickets</div></div>
          <div class="stat-card green"><div class="stat-value" id="stat-auto">-</div><div class="stat-label">Auto‑Resolved</div></div>
          <div class="stat-card purple"><div class="stat-value" id="stat-rate">-</div><div class="stat-label">Resolution Rate</div></div>
          <div class="stat-card orange"><div class="stat-value" id="stat-overrides">-</div><div class="stat-label">Overrides</div></div>
        </div>
      </section>
      <section id="queue">
        <h2>Open Tickets</h2>
        <div id="ticket-list"></div>
      </section>
      <section id="overrides">
        <h2>Submit Override</h2>
        <form id="override-form">
          <label>Ticket ID</label>
          <input id="override-ticket-id" required>
          <label>Original Intent</label>
          <input id="override-original" required>
          <label>Corrected Intent</label>
          <input id="override-corrected" required>
          <label>Reason</label>
          <textarea id="override-reason" rows="2"></textarea>
          <button type="submit" class="btn btn-primary">Submit</button>
          <div id="override-status"></div>
        </form>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    // Admin JS (fetch analytics, queue, override submission)
    // Uses app_jwt token and /admin/... endpoints
  </script>
</body>
</html>
