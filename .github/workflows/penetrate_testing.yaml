name: ZAP DAST Scan for AgentOps (Authenticated)

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://athithya.site'
  ZAP_ATTACK_STRENGTH: 'Medium'
  ZAP_ALERT_THRESHOLD: 'Medium'

jobs:
  zap-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: |
          mkdir -p reports
          chmod 777 reports

      # -----------------------------------------------------------------
      # Create Google login script (Playwright – returns cookies)
      # -----------------------------------------------------------------
      - name: Create AgentOps login script
        run: |
          cat > /tmp/agentops_login.py << 'PYEOF'
          #!/usr/bin/env python3
          """Log into Kestral via Google OAuth and return cookies for ZAP."""
          import os, json
          from playwright.sync_api import sync_playwright

          def get_authenticated_session():
              email = os.environ["TEST_ACCOUNT_EMAIL"]
              password = os.environ["TEST_ACCOUNT_PASSWORD"]
              target_url = os.environ.get("TARGET_URL", "https://athithya.site").rstrip("/")

              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context()
                  page = context.new_page()

                  # Start OAuth flow
                  page.goto(f"{target_url}/auth/login/start/google")

                  # Google email
                  page.wait_for_selector('input[type="email"]', timeout=10000)
                  page.fill('input[type="email"]', email)
                  page.click('button:has-text("Next")')

                  # Google password
                  page.wait_for_selector('input[type="password"]', timeout=10000)
                  page.fill('input[type="password"]', password)
                  page.click('button:has-text("Next")')

                  # Wait for redirect back to app
                  try:
                      page.wait_for_url(f"{target_url}/admin**", timeout=20000)
                  except Exception:
                      page.wait_for_url(f"{target_url}/**", timeout=20000)

                  # Collect cookies
                  all_cookies = context.cookies()
                  domain = target_url.split("://")[1].split("/")[0]
                  target_cookies = {c["name"]: c["value"] for c in all_cookies if domain in c.get("domain","")}
                  browser.close()
                  return target_cookies

          if __name__ == "__main__":
              session = get_authenticated_session()
              print(json.dumps(session))
          PYEOF
          chmod +x /tmp/agentops_login.py

      # -----------------------------------------------------------------
      # Write ZAP automation plan (browser auth + cookie session)
      # -----------------------------------------------------------------
      - name: Write ZAP automation plan
        run: |
          TARGET="${{ env.TARGET_URL }}"

          cat > zap_automation.yaml <<EOF
          env:
            contexts:
              - name: agentops
                urls:
                  - "${TARGET}"
                includePaths:
                  - '^${TARGET}/.*'
                excludePaths:
                  - '^${TARGET}/static/.*'
                  - '^${TARGET}/assets/.*'
                  - '^${TARGET}/.*\.(js|css|png|jpg|jpeg|svg|ico|webp|woff2|ttf)$$'
                  - '^${TARGET}/healthz$$'
                  - '^${TARGET}/readyz$$'
                authentication:
                  method: browser
                  parameters:
                    loginPageUrl: "${TARGET}/auth/login"
                    loginPageWait: 5
                    stepDelay: 1
                    browserId: firefox-headless
                    diagnostics: false
                    steps:
                      - description: "Auto-detect and submit login form"
                        type: AUTO_STEPS
                sessionManagement:
                  method: cookie
                users:
                  - name: agentops
                    credentials:
                      username: "$${TEST_ACCOUNT_EMAIL}"
                      password: "$${TEST_ACCOUNT_PASSWORD}"

          parameters:
            failOnError: false
            failOnWarning: false
            progressToStdout: true

          jobs:
            # Seed ZAP's site tree
            - type: requestor
              parameters:
                user: agentops
              requests:
                - name: Home page
                  url: "${TARGET}/"
                - name: Chat page
                  url: "${TARGET}/chat.html"
                - name: Login page
                  url: "${TARGET}/auth/login"
                - name: OAuth login start
                  url: "${TARGET}/auth/login/start/google"
                - name: Logout
                  url: "${TARGET}/auth/logout"
                - name: User info
                  url: "${TARGET}/auth/me"
                - name: JWKS endpoint
                  url: "${TARGET}/.well-known/jwks.json"
                - name: Admin dashboard
                  url: "${TARGET}/admin"
                - name: Admin queue
                  url: "${TARGET}/admin/queue"
                - name: Admin analytics
                  url: "${TARGET}/admin/analytics"
                - name: Admin override
                  url: "${TARGET}/admin/override"
                  method: POST

            # Spider public pages
            - type: spider
              parameters:
                context: agentops
                user: agentops
                maxChildren: 15

            # Active scan all in-scope pages
            - type: activeScan
              parameters:
                context: agentops
                user: agentops
                policy: Default Policy
                defaultStrength: "${{ env.ZAP_ATTACK_STRENGTH }}"
                defaultThreshold: "${{ env.ZAP_ALERT_THRESHOLD }}"
                maxRuleDurationInMins: 2
                maxScanDurationInMins: 12
                delayInMs: 500
                threadPerHost: 1
                handleAntiCSRFTokens: true
                maxAlertsPerRule: 5

            # Report
            - type: report
              parameters:
                template: traditional-json
                reportDir: /zap/wrk
                reportFile: zap_report
                reportTitle: AgentOps ZAP DAST Report
                reportDescription: Authenticated scan of AgentOps
          EOF

      # -----------------------------------------------------------------
      # Run ZAP in Docker
      # -----------------------------------------------------------------
      - name: Run ZAP authenticated scan
        run: |
          docker run --rm \
            --user root \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            -v /tmp/agentops_login.py:/tmp/agentops_login.py:ro \
            -e TEST_ACCOUNT_EMAIL="${{ secrets.TEST_ACCOUNT_EMAIL }}" \
            -e TEST_ACCOUNT_PASSWORD="${{ secrets.TEST_ACCOUNT_PASSWORD }}" \
            -e TARGET_URL="${{ env.TARGET_URL }}" \
            zaproxy/zap-stable:2.17.0 \
            zap.sh -cmd -autorun /zap/wrk/zap_automation.yaml

      # -----------------------------------------------------------------
      # Upload report
      # -----------------------------------------------------------------
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap_report*