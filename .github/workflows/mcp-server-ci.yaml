name: mcp-server-ci

on:
  push:
    branches: [main]
    paths:
      - src/workloads/mcp-server/**
      - .github/workflows/mcp-server-ci.yaml
  pull_request:
    branches: [main]
    paths:
      - src/workloads/mcp-server/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: mcp-server-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ROLE_NAME: gh-actions-agentops-mcp
  ECR_REPOSITORY: agentops-staging-mcp-server

jobs:
  build-scan-push:
    name: Build, scan, publish MCP server image
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Construct AWS role ARN
        id: aws-role
        run: |
          echo "arn=arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)"
          REGISTRY_HOST="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          PRIMARY_IMAGE="${REGISTRY_HOST}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          STAGING_IMAGE="${REGISTRY_HOST}/${{ env.ECR_REPOSITORY }}:staging"
          echo "primary_image=${PRIMARY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "staging_image=${STAGING_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build-image
        uses: docker/build-push-action@v7.1.0
        with:
          context: src/workloads/mcp-server
          file: src/workloads/mcp-server/Dockerfile
          platforms: linux/arm64
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.primary_image }}
            ${{ steps.image-meta.outputs.staging_image }}
          cache-from: type=gha,scope=mcp-server
          cache-to: type=gha,mode=max,scope=mcp-server

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.build-image.outputs.imageid }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Configure AWS credentials for ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ steps.aws-role.outputs.arn }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - name: Delete existing staging tag to allow overwrite
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          aws ecr batch-delete-image \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag=staging \
            --region "${{ secrets.AWS_REGION }}" || true

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.image-meta.outputs.primary_image }}"
          docker push "${{ steps.image-meta.outputs.staging_image }}"