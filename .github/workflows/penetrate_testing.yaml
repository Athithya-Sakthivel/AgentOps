name: ZAP DAST Scan for AgentOps (Authenticated)

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://athithya.site'
  ZAP_ATTACK_STRENGTH: 'Medium'
  ZAP_ALERT_THRESHOLD: 'Medium'

jobs:
  zap-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write ZAP automation plan
        env:
          TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
          TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
        run: |
          TARGET="$TARGET_URL"

          cat > zap_automation.yaml <<EOF
          env:
            contexts:
              - name: agentops
                urls:
                  - "${TARGET}"
                includePaths:
                  - "${TARGET}/.*"
                excludePaths:
                  - "${TARGET}/static/.*"
                  - "${TARGET}/assets/.*"
                  - "${TARGET}/.*\\.(js|css|png|jpg|jpeg|svg|ico|webp|woff2|ttf)$"
                  - "${TARGET}/healthz"
                  - "${TARGET}/readyz"
                authentication:
                  method: browser
                  parameters:
                    loginPageUrl: "${TARGET}/auth/login"
                    loginPageWait: 2
                    browserId: firefox-headless
                    steps: []
                  verification:
                    method: poll
                    loggedInRegex: '\\Q 200 OK\\E'
                    loggedOutRegex: '\\Q 401 Unauthorized\\E'
                    pollFrequency: 60
                    pollUnits: seconds
                    pollUrl: "${TARGET}/auth/me"
                    pollPostData: ""
                sessionManagement:
                  method: cookie
                users:
                  - name: agentops
                    credentials:
                      username: "${TEST_ACCOUNT_EMAIL}"
                      password: "${TEST_ACCOUNT_PASSWORD}"
            parameters:
              failOnError: true
              failOnWarning: false
              progressToStdout: true

          jobs:
            - type: spider
              parameters:
                context: agentops
                user: agentops

            - type: requestor
              parameters:
                user: agentops
              requests:
                - url: "${TARGET}/"
                  method: GET
                - url: "${TARGET}/chat.html"
                  method: GET
                - url: "${TARGET}/auth/login"
                  method: GET
                - url: "${TARGET}/auth/login/start/google"
                  method: GET
                - url: "${TARGET}/auth/logout"
                  method: GET
                - url: "${TARGET}/auth/me"
                  method: GET
                - url: "${TARGET}/.well-known/jwks.json"
                  method: GET
                - url: "${TARGET}/admin"
                  method: GET
                - url: "${TARGET}/admin/queue"
                  method: GET
                - url: "${TARGET}/admin/analytics"
                  method: GET
                - url: "${TARGET}/admin/override"
                  method: POST
                  data: ""

            - type: passiveScan-wait

            - type: activeScan
              parameters:
                context: agentops
                user: agentops
                maxRuleDurationInMins: 5
                attackStrength: "${ZAP_ATTACK_STRENGTH}"
                alertThreshold: "${ZAP_ALERT_THRESHOLD}"

            - type: report
              parameters:
                template: traditional-json
                reportDir: /zap/wrk
                reportFile: zap_report
                reportTitle: AgentOps ZAP DAST Report
                reportDescription: Authenticated scan of AgentOps

            - type: exitStatus
              parameters:
                warnLevel: Medium
                errorLevel: High
          EOF

      - name: Run ZAP authenticated scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            -e TEST_ACCOUNT_EMAIL="${{ secrets.TEST_ACCOUNT_EMAIL }}" \
            -e TEST_ACCOUNT_PASSWORD="${{ secrets.TEST_ACCOUNT_PASSWORD }}" \
            -e TARGET_URL="${{ env.TARGET_URL }}" \
            -e ZAP_ATTACK_STRENGTH="${{ env.ZAP_ATTACK_STRENGTH }}" \
            -e ZAP_ALERT_THRESHOLD="${{ env.ZAP_ALERT_THRESHOLD }}" \
            zaproxy/zap-stable:2.17.0 \
            zap.sh -cmd -autorun /zap/wrk/zap_automation.yaml

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap_report*