name: ZAP DAST Scan for AgentOps (Authenticated)

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://athithya.site'
  ZAP_ATTACK_STRENGTH: 'Medium'
  ZAP_ALERT_THRESHOLD: 'Medium'

jobs:
  zap-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Prepare report directory
        run: |
          mkdir -p reports
          chmod 777 reports

      - name: Write ZAP automation plan
        env:
          TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
          TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
        run: |
          set -eu

          TARGET="${TARGET_URL}"

          cat > zap_automation.yaml <<EOF
          env:
            contexts:
              - name: agentops
                urls:
                  - "${TARGET}"
                includePaths:
                  - '^https://athithya.site/.*'
                excludePaths:
                  - '^https://athithya.site/static/.*'
                  - '^https://athithya.site/assets/.*'
                  - '^https://athithya.site/.*\.(js|css|png|jpg|jpeg|svg|ico|webp|woff2|ttf)$'
                  - '^https://athithya.site/healthz$'
                  - '^https://athithya.site/readyz$'
                authentication:
                  method: browser
                  parameters:
                    loginPageUrl: "${TARGET}/auth/login"
                    loginPageWait: 5
                    stepDelay: 1
                    browserId: firefox-headless
                    diagnostics: false
                    steps:
                      - description: Auto-detect and submit login form
                        type: AUTO_STEPS
                sessionManagement:
                  method: cookie
                users:
                  - name: agentops
                    credentials:
                      username: "${TEST_ACCOUNT_EMAIL}"
                      password: "${TEST_ACCOUNT_PASSWORD}"
            parameters:
              failOnError: true
              failOnWarning: false
              progressToStdout: true

          jobs:
            - type: requestor
              parameters:
                user: agentops
              requests:
                - name: Home page
                  url: "${TARGET}/"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Chat page
                  url: "${TARGET}/chat.html"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Login page
                  url: "${TARGET}/auth/login"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: OAuth login start
                  url: "${TARGET}/auth/login/start/google"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Logout
                  url: "${TARGET}/auth/logout"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Me
                  url: "${TARGET}/auth/me"
                  method: GET
                  headers:
                    - 'Accept: application/json, text/plain, */*'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: JWKS
                  url: "${TARGET}/.well-known/jwks.json"
                  method: GET
                  headers:
                    - 'Accept: application/json, text/plain, */*'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Admin dashboard
                  url: "${TARGET}/admin"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Admin queue
                  url: "${TARGET}/admin/queue"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Admin analytics
                  url: "${TARGET}/admin/analytics"
                  method: GET
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

                - name: Admin override
                  url: "${TARGET}/admin/override"
                  method: POST
                  data: ''
                  headers:
                    - 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                    - 'Accept-Language: en-US,en;q=0.9'
                    - 'Cache-Control: no-cache'

            - type: passiveScan-wait

            - type: activeScan
              parameters:
                context: agentops
                user: agentops
                url: "${TARGET}/chat.html"
                policy: Default Policy
                defaultStrength: "${ZAP_ATTACK_STRENGTH}"
                defaultThreshold: "${ZAP_ALERT_THRESHOLD}"
                maxRuleDurationInMins: 2
                maxScanDurationInMins: 6
                delayInMs: 500
                threadPerHost: 1
                handleAntiCSRFTokens: true
                addQueryParam: false
                scanHeadersAllRequests: false
                maxAlertsPerRule: 5

            - type: activeScan
              parameters:
                context: agentops
                user: agentops
                url: "${TARGET}/admin"
                policy: Default Policy
                defaultStrength: "${ZAP_ATTACK_STRENGTH}"
                defaultThreshold: "${ZAP_ALERT_THRESHOLD}"
                maxRuleDurationInMins: 2
                maxScanDurationInMins: 10
                delayInMs: 500
                threadPerHost: 1
                handleAntiCSRFTokens: true
                addQueryParam: false
                scanHeadersAllRequests: false
                maxAlertsPerRule: 5

            - type: report
              parameters:
                template: traditional-json
                reportDir: /zap/wrk
                reportFile: zap_report
                reportTitle: AgentOps ZAP DAST Report
                reportDescription: Authenticated scan of AgentOps

            - type: exitStatus
              parameters:
                warnLevel: Medium
                errorLevel: High
          EOF

      - name: Run ZAP authenticated scan
        run: |
          docker run --rm \
            --user root \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            -e TEST_ACCOUNT_EMAIL="${{ secrets.TEST_ACCOUNT_EMAIL }}" \
            -e TEST_ACCOUNT_PASSWORD="${{ secrets.TEST_ACCOUNT_PASSWORD }}" \
            -e TARGET_URL="${{ env.TARGET_URL }}" \
            zaproxy/zap-stable:2.17.0 \
            zap.sh -cmd -autorun /zap/wrk/zap_automation.yaml

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap_report*