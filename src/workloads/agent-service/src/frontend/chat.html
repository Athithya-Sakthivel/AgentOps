<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kestral – Support Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="chat-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">🏪 Kestral</a>
      <div class="nav-links">
        <a href="/" class="nav-link">← Store</a>
        <button onclick="logout()" class="btn btn-ghost">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="chat-layout">
    <aside class="chat-sidebar">
      <h3>Quick Help</h3>
      <button onclick="sendQuick('Where is my order?')">📦 Track Order</button>
      <button onclick="sendQuick('I want to return an item')">↩️ Return</button>
      <button onclick="sendQuick('What is your refund policy?')">💰 Refund</button>
      <button onclick="sendQuick('My delivery is late')">🚚 Late Delivery</button>
    </aside>
    <main class="chat-main">
      <div id="messages" class="chat-messages">
        <div class="bubble agent">
          <div class="bubble-avatar">🤖</div>
          <div class="bubble-text">Hi! How can I help you today?</div>
        </div>
      </div>
      <div class="chat-input-bar">
        <input id="query-input" type="text" placeholder="Type your message..." autofocus>
        <button id="send-btn" disabled>Send</button>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    const token = localStorage.getItem('app_jwt');
    if (!token) location.href = '/';

    const sessionId = 'full-' + Math.random().toString(36).substr(2, 9);
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${wsProto}//${location.host}/ws/chat/${sessionId}?token=${token}`);
    const msgs = document.getElementById('messages');
    const input = document.getElementById('query-input');
    const sendBtn = document.getElementById('send-btn');

    function addBubble(text, type) {
      const d = document.createElement('div');
      d.className = `bubble ${type}`;
      d.innerHTML = `<div class="bubble-avatar">${type==='user'?'👤':'🤖'}</div><div class="bubble-text">${text}</div>`;
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
    }

    ws.onopen = () => sendBtn.disabled = false;
    ws.onmessage = e => addBubble(JSON.parse(e.data).response || 'Error', 'agent');
    ws.onerror = () => addBubble('Connection error', 'agent');

    sendBtn.addEventListener('click', () => {
      const q = input.value.trim();
      if (!q) return;
      ws.send(JSON.stringify({ query: q }));
      addBubble(q, 'user');
      input.value = '';
    });
    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });

    function sendQuick(msg) { input.value = msg; sendBtn.click(); }
  </script>
</body>
</html>
