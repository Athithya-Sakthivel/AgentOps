<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kestral — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <nav class="nav nav-admin">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-icon">🏪</span>
        <span class="brand-text">Kestral</span>
        <span class="brand-badge">Admin</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/chat.html" class="nav-link">Support Chat</a>
        <a href="#" onclick="logout()" class="nav-link nav-link-danger">Sign Out</a>
      </div>
    </div>
  </nav>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a href="#overview" class="sidebar-link active">📊 Overview</a>
      <a href="#queue" class="sidebar-link">🎫 Ticket Queue</a>
      <a href="#overrides" class="sidebar-link">✏️ Overrides</a>
    </aside>

    <div class="admin-content">
      <section id="overview" class="admin-section">
        <h2 class="section-title">Overview</h2>
        <div class="stats-grid">
          <div class="stat-card stat-blue"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total Tickets</div></div>
          <div class="stat-card stat-green"><div class="stat-value" id="stat-auto">-</div><div class="stat-label">Auto Resolved</div></div>
          <div class="stat-card stat-purple"><div class="stat-value" id="stat-rate">-</div><div class="stat-label">Resolution Rate</div></div>
          <div class="stat-card stat-orange"><div class="stat-value" id="stat-overrides">-</div><div class="stat-label">Human Overrides</div></div>
        </div>
      </section>

      <section id="queue" class="admin-section">
        <h2 class="section-title">Open Tickets</h2>
        <div id="ticket-list" class="ticket-list"><div class="loading">Loading tickets...</div></div>
      </section>

      <section id="overrides" class="admin-section">
        <h2 class="section-title">Submit Override</h2>
        <form id="override-form" class="override-form" onsubmit="return false;">
          <label>Ticket ID</label>
          <input id="override-ticket-id" type="text" placeholder="e.g., e5f6a7b8-c9d0-4e1f-2a3b-000000000001" required>
          <label>Original Intent</label>
          <input id="override-original" type="text" placeholder="e.g., general_inquiry" required>
          <label>Corrected Intent</label>
          <input id="override-corrected" type="text" placeholder="e.g., refund_request" required>
          <label>Reason</label>
          <textarea id="override-reason" rows="2" placeholder="Why was this overridden?"></textarea>
          <button type="submit" class="btn btn-primary">Submit Override</button>
          <div id="override-status" class="hidden"></div>
        </form>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    const token = localStorage.getItem('app_jwt');
    if (!token) window.location.href = '/auth/login';
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    async function loadOverview() {
      const resp = await fetch('/admin/analytics', { headers });
      if (!resp.ok) return;
      const d = await resp.json();
      document.getElementById('stat-total').textContent = d.total_tickets || 0;
      document.getElementById('stat-auto').textContent = d.auto_resolved || 0;
      document.getElementById('stat-rate').textContent = (d.auto_resolution_rate || 0) + '%';
      document.getElementById('stat-overrides').textContent = d.human_overrides || 0;
    }

    async function loadQueue() {
      const resp = await fetch('/admin/queue', { headers });
      const list = document.getElementById('ticket-list');
      if (!resp.ok) { list.innerHTML = '<div class="error">Access denied. Admin privileges required.</div>'; return; }
      const d = await resp.json();
      if (!d.tickets.length) { list.innerHTML = '<div class="empty">No open tickets. 🎉</div>'; return; }
      list.innerHTML = d.tickets.map(t => `
        <div class="ticket-card">
          <div class="ticket-header">
            <span class="ticket-id">#${t.id.substring(0, 8)}</span>
            <span class="badge badge-${t.priority}">${t.priority}</span>
          </div>
          <p class="ticket-query">${t.query_text}</p>
          <div class="ticket-meta">
            <span>Intent: ${t.classification?.intent || 'N/A'}</span>
            <span>Status: ${t.status}</span>
            <span>${new Date(t.created_at).toLocaleDateString()}</span>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('override-form').addEventListener('submit', async () => {
      const body = {
        ticket_id: document.getElementById('override-ticket-id').value,
        original_classification: { intent: document.getElementById('override-original').value },
        corrected_classification: { intent: document.getElementById('override-corrected').value },
        reason: document.getElementById('override-reason').value,
        overridden_by: 'admin'
      };
      const resp = await fetch('/admin/override', { method: 'POST', headers, body: JSON.stringify(body) });
      const status = document.getElementById('override-status');
      status.classList.remove('hidden');
      if (resp.ok) { status.textContent = '✅ Override submitted successfully.'; status.className = 'success'; }
      else { status.textContent = '❌ Failed to submit override.'; status.className = 'error'; }
    });

    loadOverview();
    loadQueue();
  </script>
</body>
</html>
